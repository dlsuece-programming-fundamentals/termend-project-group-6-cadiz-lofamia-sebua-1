<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Customers</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<div class="container mobile-container">

  <!-- Header -->
  <div class="header text-center">
    Sari-Sari Store
  </div>

  <!-- Total Outstanding -->
  <div class="card mt-3 p-3 utang-summary">
    <h6>Total Outstanding</h6>
    <h3>₱<span id="totalUtang">0.00</span></h3>
    <small><span id="customerCount">0</span> customer(s) with debt</small>
  </div>

  <!-- Add Customer Button -->
  <button class="btn btn-primary w-100 mt-3" onclick="openModal()">
    + Add New Customer
  </button>

  <!-- Customer List -->
  <div id="customerList" class="mt-3"></div>

  <!-- Empty State -->
  <div id="emptyState" class="text-center mt-5 text-muted">
    No customers added yet
  </div>

</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <a href="sell.html">Sell</a>
  <a href="inventory.html">Inventory</a>
  <a href="customers.html" class="active">Customers</a>
  <a href="summary.html">Summary</a>
</div>

<!-- Add Customer Modal -->
<div class="modal fade" id="customerModal">
  <div class="modal-dialog">
    <div class="modal-content p-3">

      <h5>Add Customer</h5>

      <input type="text" id="customerName" class="form-control mt-2" placeholder="Customer Name">

      <button class="btn btn-success mt-3" onclick="addCustomer()">
        Save Customer
      </button>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/customers.js"></script>

</body>
</html>
