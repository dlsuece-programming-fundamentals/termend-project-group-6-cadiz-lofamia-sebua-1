<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sari-Sari Store — Customers</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Specific styles for the Customer/Debt layout */
        .summary-bar {
            background: var(--rainbow);
            border-radius: 20px; padding: 20px;
            margin-bottom: 20px; color: white;
        }
        .summary-bar .lbl { font-size: 0.9rem; font-weight: 700; opacity: 0.85; }
        .summary-bar .amt { font-size: 1.8rem; font-weight: 900; margin-top: 4px; }

        .customer-top {
            display: flex; align-items: center;
            justify-content: space-between; margin-bottom: 10px;
        }
        .customer-name { font-weight: 800; font-size: 1rem; }
        .customer-total { font-size: 1rem; font-weight: 900; color: var(--orange); }
        .customer-total.paid { color: var(--green); }

        .utang-item {
            display: flex; align-items: center;
            justify-content: space-between;
            background: var(--gray-bg); border-radius: 10px; padding: 8px 12px;
            margin-bottom: 6px;
        }
        .utang-item-date { font-size: 0.78rem; color: var(--text-muted); font-weight: 600; }
        .utang-item-amount { font-size: 0.9rem; font-weight: 800; }
        
        .utang-status {
            font-size: 0.78rem; font-weight: 800;
            padding: 3px 10px; border-radius: 20px;
        }
        .utang-status.unpaid { background: #fff3e0; color: var(--orange); }
        .utang-status.paid { background: #e8f5e9; color: var(--green); }

        .pay-btn {
            padding: 6px 12px; border-radius: 10px; border: none;
            background: #e8f0fe; color: var(--active-blue);
            font-family: inherit; font-size: 0.8rem; font-weight: 800;
            cursor: pointer; margin-left: 8px;
        }
    </style>
</head>
<body>

    <div class="topbar"><h1>Customers</h1></div>

    <div class="page">
        <div class="summary-bar">
            <div class="lbl">Total Unpaid Utang</div>
            <div class="amt">₱<span id="totalUnpaid">0.00</span></div>
        </div>

        <div class="section-label">Customer Debts</div>
        <div id="customerList">
            </div>
    </div>

    <nav class="bottom-nav">
        <a href="sell.html" class="nav-item">
            <div class="nav-icon-wrap"><span>🛒</span><span>Sell</span></div>
        </a>
        <a href="inventory.html" class="nav-item">
            <div class="nav-icon-wrap"><span>📦</span><span>Inventory</span></div>
        </a>
        <a href="customers.html" class="nav-item active">
            <div class="nav-icon-wrap"><span>👥</span><span>Customers</span></div>
        </a>
        <a href="summary.html" class="nav-item">
            <div class="nav-icon-wrap"><span>📊</span><span>Summary</span></div>
        </a>
    </nav>

    <div class="toast" id="toast"></div>

    <script src="js/customers.js"></script>
</body>
</html>
