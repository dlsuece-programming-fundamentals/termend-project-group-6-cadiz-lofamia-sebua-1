<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Customers</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<div class="container mobile-container">

  <!-- Header -->
  <div class="header text-center">
    Sari-Sari Store
  </div>

  <!-- Total Outstanding -->
  <div class="card mt-3 p-3 utang-summary">
    <h6>Total Outstanding</h6>
    <h3>₱<span id="totalUtang">0.00</span></h3>
    <small><span id="customerCount">0</span> customer(s) with debt</small>
  </div>

  <!-- Add Customer Button -->
  <button class="btn btn-primary w-100 mt-3" onclick="openModal()">
    + Add New Customer
  </button>

  <!-- Customer List -->
  <div id="customerList" class="mt-3"></div>

  <!-- Empty State -->
  <div id="emptyState" class="text-center mt-5 text-muted">
    No customers added yet
  </div>

</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
    <a href="sell.html" class="nav-item active">
        <div class="nav-icon-wrap"><span>🛒</span><span>Sell</span></div>
    </a>
    <a href="inventory.html" class="nav-item">
        <div class="nav-icon-wrap"><span>📦</span><span>Inventory</span></div>
    </a>
    <a href="customers.html" class="nav-item">
        <div class="nav-icon-wrap"><span>👥</span><span>Customers</span></div>
    </a>
    <a href="summary.html" class="nav-item">
        <div class="nav-icon-wrap"><span>📊</span><span>Summary</span></div>
    </a>
</nav>

<!-- Add Customer Modal -->
<div class="modal fade" id="customerModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content p-3 border-0 shadow">
      <h5 class="fw-bold">Add New Customer</h5>
      
      <div class="mt-3">
        <label class="small text-muted fw-bold">Customer Name</label>
        <input type="text" id="customerName" class="form-control" placeholder="e.g., Juan Dela Cruz">
      </div>

      <div class="mt-3">
        <label class="small text-muted fw-bold">Phone (Optional)</label>
        <input type="text" id="customerPhone" class="form-control" placeholder="e.g., 09123456789">
      </div>

      <div class="d-flex gap-2 mt-4">
        <button class="btn btn-success w-100 fw-bold" onclick="addCustomer()">Save</button>
        <button class="btn btn-secondary w-100 fw-bold" data-bs-dismiss="modal">Cancel</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/customers.js"></script>

</body>
</html>
