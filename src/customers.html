<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sari-Sari Store — Customers</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        :root {
            --primary-blue: #6146ff;
            --active-blue: #226cff;
            --rainbow: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%);
            --gray-bg: #f8f9fa;
            --text-dark: #1a1d23;
            --text-muted: #adb5bd;
            --border: #e9ecef;
            --bottom-nav-h: 75px;
            --red: #e53935;
            --green: #43a047;
            --orange: #ef6c00;
        }
        body {
            font-family: 'Nunito', sans-serif;
            background: var(--gray-bg);
            color: var(--text-dark);
            min-height: 100dvh;
            padding-bottom: calc(var(--bottom-nav-h) + 20px);
        }
        .topbar {
            background: var(--primary-blue); padding: 18px;
            position: sticky; top: 0; z-index: 100;
            text-align: center; color: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .topbar h1 { font-size: 1.2rem; font-weight: 800; }
        .page { padding: 16px; max-width: 500px; margin: auto; }

        /* Summary Bar */
        .summary-bar {
            background: var(--rainbow);
            border-radius: 20px; padding: 20px;
            margin-bottom: 20px; color: white;
        }
        .summary-bar .lbl { font-size: 0.9rem; font-weight: 700; opacity: 0.85; }
        .summary-bar .amt { font-size: 1.8rem; font-weight: 900; margin-top: 4px; }

        .section-label { font-size: 0.95rem; font-weight: 800; color: #000; margin-bottom: 12px; }

        /* Customer Cards */
        .customer-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .customer-card {
            background: white; border: 1px solid var(--border);
            border-radius: 15px; padding: 15px;
        }
        .customer-top {
            display: flex; align-items: center;
            justify-content: space-between; margin-bottom: 10px;
        }
        .customer-name { font-weight: 800; font-size: 1rem; }
        .customer-total { font-size: 1rem; font-weight: 900; color: var(--orange); }
        .customer-total.paid { color: var(--green); }

        /* Utang items */
        .utang-list { display: flex; flex-direction: column; gap: 8px; }
        .utang-item {
            background: var(--gray-bg); border-radius: 12px; padding: 12px;
        }
        .utang-item-header {
            display: flex; justify-content: space-between; align-items: flex-start;
            margin-bottom: 8px;
        }
        .utang-item-date { font-size: 0.78rem; color: var(--text-muted); font-weight: 600; }
        .utang-item-total { font-size: 0.85rem; font-weight: 700; color: var(--text-dark); }

        /* Progress bar */
        .progress-wrap { margin-bottom: 8px; }
        .progress-labels {
            display: flex; justify-content: space-between;
            font-size: 0.78rem; font-weight: 700; margin-bottom: 4px;
        }
        .progress-paid  { color: var(--green); }
        .progress-remaining { color: var(--orange); }
        .progress-bar-bg {
            background: #e0e0e0; border-radius: 10px; height: 8px; overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%; border-radius: 10px;
            background: var(--green); transition: width 0.3s;
        }

        /* Payment row */
        .pay-row { display: flex; gap: 8px; align-items: center; }
        .pay-input {
            flex: 1; padding: 10px 12px; border-radius: 10px;
            border: 1.5px solid var(--border); background: white;
            font-family: inherit; font-size: 0.9rem; font-weight: 700;
            color: var(--text-dark); outline: none;
        }
        .pay-input:focus { border-color: var(--active-blue); }
        .pay-btn {
            padding: 10px 16px; border-radius: 10px; border: none;
            background: var(--active-blue); color: white;
            font-family: inherit; font-size: 0.85rem; font-weight: 800;
            cursor: pointer; white-space: nowrap;
        }
        .pay-btn:active { opacity: 0.7; }
        .pay-full-btn {
            padding: 10px 16px; border-radius: 10px; border: none;
            background: #e8f5e9; color: var(--green);
            font-family: inherit; font-size: 0.85rem; font-weight: 800;
            cursor: pointer; white-space: nowrap;
        }
        .pay-full-btn:active { opacity: 0.7; }

        .utang-status {
            font-size: 0.78rem; font-weight: 800;
            padding: 3px 10px; border-radius: 20px;
        }
        .utang-status.paid { background: #e8f5e9; color: var(--green); }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; height: var(--bottom-nav-h);
            background: white; border-top: 1px solid var(--border);
            display: flex; justify-content: space-around; align-items: center; z-index: 200;
        }
        .nav-item { flex: 1; text-decoration: none; display: flex; justify-content: center; color: #5f6368; }
        .nav-icon-wrap {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; width: 85px; height: 60px; border-radius: 14px; gap: 2px;
        }
        .nav-item.active { color: white; }
        .nav-item.active .nav-icon-wrap { background: var(--active-blue); }
        .nav-item span:first-child { font-size: 1.3rem; }
        .nav-item span:last-child { font-size: 0.75rem; font-weight: 700; }

        .toast {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
            background: #323232; color: white; padding: 12px 24px; border-radius: 50px;
            font-size: 0.9rem; opacity: 0; transition: 0.3s; z-index: 1000;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>

<div class="topbar"><h1>Customers</h1></div>

<div class="page">
    <div class="summary-bar">
        <div class="lbl">Total Unpaid Utang</div>
        <div class="amt">₱<span id="totalUnpaid">0.00</span></div>
    </div>

    <div class="section-label">Customer Debts</div>
    <div class="customer-list" id="customerList"></div>
</div>

<nav class="bottom-nav">
    <a href="sell.html" class="nav-item">
        <div class="nav-icon-wrap"><span>🛒</span><span>Sell</span></div>
    </a>
    <a href="inventory.html" class="nav-item">
        <div class="nav-icon-wrap"><span>📦</span><span>Inventory</span></div>
    </a>
    <a href="customers.html" class="nav-item active">
        <div class="nav-icon-wrap"><span>👥</span><span>Customers</span></div>
    </a>
    <a href="summary.html" class="nav-item">
        <div class="nav-icon-wrap"><span>📊</span><span>Summary</span></div>
    </a>
</nav>

<div class="toast" id="toast"></div>

<script>
    const API = {
        customers: 'api/get_customers.php',
        pay:       'api/pay_utang.php'
    };

    async function loadCustomers() {
        const el = document.getElementById('customerList');
        el.innerHTML = '<p style="text-align:center;color:gray;padding:20px 0">Loading…</p>';
        try {
            const res  = await fetch(API.customers);
            const data = JSON.parse(await res.text());
            if (!data.success) throw new Error(data.error);
            renderCustomers(data.customers);
            updateTotalUnpaid(data.customers);
        } catch (err) {
            el.innerHTML = `<p style="text-align:center;color:red;padding:20px 0;font-size:0.85rem">❌ ${err.message}</p>`;
        }
    }

    function updateTotalUnpaid(customers) {
        let total = 0;
        customers.forEach(c => {
            c.utangs.forEach(u => {
                if (u.status === 'unpaid') {
                    total += parseFloat(u.amount) - parseFloat(u.paid_amount || 0);
                }
            });
        });
        document.getElementById('totalUnpaid').innerText = total.toFixed(2);
    }

    function renderCustomers(customers) {
        const el = document.getElementById('customerList');
        if (customers.length === 0) {
            el.innerHTML = '<p style="text-align:center;color:gray;padding:20px 0">No customers yet.</p>';
            return;
        }

        el.innerHTML = customers.map(c => {
            const unpaidTotal = c.utangs
                .filter(u => u.status === 'unpaid')
                .reduce((sum, u) => sum + (parseFloat(u.amount) - parseFloat(u.paid_amount || 0)), 0);
            const allPaid = unpaidTotal === 0;

            const utangRows = c.utangs.map(u => {
                const total      = parseFloat(u.amount);
                const paid       = parseFloat(u.paid_amount || 0);
                const remaining  = total - paid;
                const pct        = Math.min(100, (paid / total) * 100).toFixed(1);
                const isPaid     = u.status === 'paid';

                return `
                <div class="utang-item">
                    <div class="utang-item-header">
                        <div>
                            <div class="utang-item-date">${formatDate(u.created_at)}</div>
                            <div class="utang-item-total">Total: ₱${total.toFixed(2)}</div>
                        </div>
                        ${isPaid
                            ? '<span class="utang-status paid">✅ Fully Paid</span>'
                            : `<span style="font-size:0.85rem;font-weight:900;color:var(--orange)">₱${remaining.toFixed(2)} left</span>`
                        }
                    </div>

                    <div class="progress-wrap">
                        <div class="progress-labels">
                            <span class="progress-paid">Paid ₱${paid.toFixed(2)}</span>
                            ${!isPaid ? `<span class="progress-remaining">${pct}%</span>` : ''}
                        </div>
                        <div class="progress-bar-bg">
                            <div class="progress-bar-fill" style="width:${pct}%"></div>
                        </div>
                    </div>

                    ${!isPaid ? `
                    <div class="pay-row">
                        <input
                            type="number"
                            class="pay-input"
                            id="pay-amt-${u.id}"
                            placeholder="Enter amount"
                            min="1"
                            max="${remaining.toFixed(2)}"
                            step="0.01"
                        >
                        <button class="pay-btn" onclick="payPartial(${u.id}, ${remaining.toFixed(2)})">Pay</button>
                        <button class="pay-full-btn" onclick="payFull(${u.id}, ${remaining.toFixed(2)})">Full</button>
                    </div>` : ''}
                </div>`;
            }).join('');

            return `
            <div class="customer-card">
                <div class="customer-top">
                    <div class="customer-name">👤 ${c.name}</div>
                    <div class="customer-total ${allPaid ? 'paid' : ''}">
                        ${allPaid ? '✅ All paid' : '₱' + unpaidTotal.toFixed(2)}
                    </div>
                </div>
                <div class="utang-list">${utangRows}</div>
            </div>`;
        }).join('');
    }

    // Pay a custom amount
    async function payPartial(id, remaining) {
        const input  = document.getElementById(`pay-amt-${id}`);
        const amount = parseFloat(input.value);

        if (isNaN(amount) || amount <= 0) {
            showToast('⚠️ Enter a valid amount'); return;
        }
        if (amount > remaining) {
            showToast(`⚠️ Max payment is ₱${remaining.toFixed(2)}`); return;
        }
        await submitPayment(id, amount);
    }

    // Pay the full remaining balance
    async function payFull(id, remaining) {
        if (!confirm(`Pay full remaining ₱${remaining.toFixed(2)}?`)) return;
        await submitPayment(id, remaining);
    }

    async function submitPayment(id, amount) {
        try {
            const res  = await fetch(API.pay, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, amount })
            });
            const data = JSON.parse(await res.text());
            if (!data.success) throw new Error(data.error);
            showToast(data.status === 'paid' ? '✅ Fully paid!' : '✅ Payment recorded!');
            loadCustomers();
        } catch (err) { showToast('❌ ' + err.message); }
    }

    function formatDate(dateStr) {
        if (!dateStr) return '';
        const d = new Date(dateStr);
        return d.toLocaleDateString('en-PH', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    loadCustomers();
</script>
</body>
</html>
