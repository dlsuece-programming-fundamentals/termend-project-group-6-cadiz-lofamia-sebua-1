<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sari-Sari Store — Summary</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Page-specific styles for the Summary Dashboard */
        .today-total { font-size: 2rem; font-weight: 900; margin-bottom: 4px; }
        .today-sub { font-size: 0.85rem; font-weight: 700; opacity: 0.85; }

        .stat-row { display: flex; gap: 10px; margin-bottom: 16px; }
        .stat-card {
            flex: 1; background: white; border: 1px solid var(--border);
            border-radius: 15px; padding: 14px; text-align: center;
        }
        .stat-label { font-size: 0.8rem; font-weight: 700; color: var(--text-muted); margin-bottom: 6px; }
        .stat-value { font-size: 1.15rem; font-weight: 900; }
        .stat-value.cash { color: var(--green); }
        .stat-value.utang { color: var(--orange); }

        .filter-tabs { display: flex; gap: 8px; margin-bottom: 14px; }
        .filter-tab {
            padding: 8px 16px; border-radius: 20px; border: 1.5px solid var(--border);
            background: white; font-family: inherit; font-size: 0.85rem;
            font-weight: 700; color: var(--text-muted); cursor: pointer;
        }
        .filter-tab.active {
            background: var(--active-blue); border-color: var(--active-blue); color: white;
        }

        .tx-type {
            display: inline-block; font-size: 0.78rem; font-weight: 800;
            padding: 3px 10px; border-radius: 20px; margin-bottom: 4px;
        }
        .tx-type.cash { background: #e8f5e9; color: var(--green); }
        .tx-type.utang { background: #fff3e0; color: var(--orange); }
    </style>
</head>
<body>

    <div class="topbar"><h1>Summary</h1></div>

    <div class="page">
        <div class="rainbow-card">
            <div class="card-label">Today's Sales</div>
            <div class="today-total">₱<span id="todayTotal">0.00</span></div>
            <div class="today-sub"><span id="todayCount">0</span> transactions today</div>
        </div>

        <div class="stat-row">
            <div class="stat-card">
                <div class="stat-label">💵 Cash Today</div>
                <div class="stat-value cash">₱<span id="cashTotal">0.00</span></div>
            </div>
            <div class="stat-card">
                <div class="stat-label">💳 Utang Today</div>
                <div class="stat-value utang">₱<span id="utangTotal">0.00</span></div>
            </div>
        </div>

        <div class="section-label">Transactions</div>
        <div class="filter-tabs">
            <button class="filter-tab active" onclick="setFilter('all', this)">All</button>
            <button class="filter-tab" onclick="setFilter('cash', this)">Cash</button>
            <button class="filter-tab" onclick="setFilter('utang', this)">Utang</button>
        </div>
        
        <div id="txList">
            </div>
    </div>

    <nav class="bottom-nav">
        <a href="sell.html" class="nav-item">
            <div class="nav-icon-wrap"><span>🛒</span><span>Sell</span></div>
        </a>
        <a href="inventory.html" class="nav-item">
            <div class="nav-icon-wrap"><span>📦</span><span>Inventory</span></div>
        </a>
        <a href="customers.html" class="nav-item">
            <div class="nav-icon-wrap"><span>👥</span><span>Customers</span></div>
        </a>
        <a href="summary.html" class="nav-item active">
            <div class="nav-icon-wrap"><span>📊</span><span>Summary</span></div>
        </a>
    </nav>

    <div class="toast" id="toast"></div>

    <script src="js/summary.js"></script>
</body>
</html>
