<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Summary</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <!-- Bootstrap -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

        <link rel="stylesheet" href="css/styles.css">
    </head>

    <body>

    <div class="container mobile-container">

    <!-- Header -->
        <div class="header text-center">
            Sari-Sari Store
        </div>

    <!-- Filter Tabs -->
        <div class="d-flex justify-content-between mt-3 filter-tabs">
            <button class="btn btn-primary w-100 me-1 active" onclick="setFilter('today')">Today</button>
            <button class="btn btn-light w-100 me-1" onclick="setFilter('week')">Week</button>
            <button class="btn btn-light w-100" onclick="setFilter('month')">Month</button>
        </div>

    <!-- Total Sales -->
        <div class="card mt-3 p-3 sales-card">
            <h6>Total Sales</h6>
            <h3>₱<span id="totalSales">0.00</span></h3>
            <small><span id="totalTransactions">0</span> transaction(s)</small>
        </div>

        <!-- Net Profit -->
        <div class="card mt-3 p-3 profit-card">
            <h6>Net Profit</h6>
            <h3>₱<span id="netProfit">0.00</span></h3>
        </div>

        <!-- Cash vs Credit -->
        <div class="d-flex gap-2 mt-3">
            <div class="card p-3 w-50 text-center cash-card">
                <h6>Cash Received</h6>
                <h5>₱<span id="cashTotal">0.00</span></h5>
            </div>

            <div class="card p-3 w-50 text-center credit-card">
                <h6>Credit / Debt</h6>
                <h5>₱<span id="utangTotal">0.00</span></h5>
            </div>
        </div>

        <!-- Empty State -->
        <div class="text-center mt-5 text-muted">
            <p>No transactions for this period</p>
        </div>

    </div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
    <a href="sell.html" class="nav-item active">
        <div class="nav-icon-wrap"><span>🛒</span><span>Sell</span></div>
    </a>
    <a href="inventory.html" class="nav-item">
        <div class="nav-icon-wrap"><span>📦</span><span>Inventory</span></div>
    </a>
    <a href="customers.html" class="nav-item">
        <div class="nav-icon-wrap"><span>👥</span><span>Customers</span></div>
    </a>
    <a href="summary.html" class="nav-item">
        <div class="nav-icon-wrap"><span>📊</span><span>Summary</span></div>
    </a>
</nav>

    <script src="js/summary.js"></script>

    </body>
</html>
