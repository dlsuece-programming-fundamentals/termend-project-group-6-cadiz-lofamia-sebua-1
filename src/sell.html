<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sari-Sari Store — Sell</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .mode-toggle { display: flex; background: rgba(255,255,255,0.2); border-radius: 14px; padding: 4px; gap: 4px; }
        .mode-toggle label { flex: 1; text-align: center; padding: 12px; border-radius: 10px; font-size: 0.9rem; font-weight: 700; color: white; cursor: pointer; }
        .mode-toggle input { display: none; }
        .mode-toggle input:checked + label { background: white; color: #009688; }
        .customer-field { margin-top: 12px; display: none; }
        .customer-field.visible { display: block; }
        .customer-field input { width: 100%; padding: 12px; border-radius: 12px; border: none; outline: none; font-weight: 600; }
        .complete-btn { width: 100%; padding: 18px; border: none; border-radius: 15px; font-size: 1rem; font-weight: 800; color: white; background: #ced4da; cursor: not-allowed; }
        .complete-btn.active-ready { background: var(--active-blue); cursor: pointer; }
    </style>
</head>
<body>
    <div class="topbar"><h1>Sari-Sari Store</h1></div>
    <div class="page">
        <div class="rainbow-card">
            <div class="card-label">New Transaction</div>
            <div class="mode-toggle">
                <input type="radio" name="saleType" id="cash" checked>
                <label for="cash" onclick="updateMode('cash')">🛒 Cash Sale</label>
                <input type="radio" name="saleType" id="utang">
                <label for="utang" onclick="updateMode('utang')">💳 Credit/Utang</label>
            </div>
            <div class="customer-field" id="customerDiv">
                <input type="text" id="customerName" placeholder="👤 Who is borrowing?" oninput="refreshUI()">
            </div>
        </div>
        <div class="section-label">Select Items</div>
        <div id="itemList"></div>
        <div class="tx-card" style="display:flex; justify-content: space-between; align-items: center;">
            <span style="font-weight:700">Total:</span>
            <span style="font-size:1.2rem; font-weight:900">₱<span id="totalDisplay">0.00</span></span>
        </div>
        <button class="complete-btn" id="completeBtn" onclick="processSale()" disabled>Complete Transaction</button>
    </div>

    <nav class="bottom-nav">
        <a href="sell.html" class="nav-item active"><div class="nav-icon-wrap"><span>🛒</span><span>Sell</span></div></a>
        <a href="inventory.html" class="nav-item"><div class="nav-icon-wrap"><span>📦</span><span>Inventory</span></div></a>
        <a href="customers.html" class="nav-item"><div class="nav-icon-wrap"><span>👥</span><span>Customers</span></div></a>
        <a href="summary.html" class="nav-item"><div class="nav-icon-wrap"><span>📊</span><span>Summary</span></div></a>
    </nav>
    <div class="toast" id="toast"></div>
    <script src="js/sell.js"></script>
</body>
</html>
