<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Inventory</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<div class="container mobile-container">

  <!-- Header -->
  <div class="header text-center">
    Sari-Sari Store
  </div>

  <!-- Add Item Button -->
  <button class="btn btn-primary w-100 mt-3" onclick="openModal()">
    + Add New Item
  </button>

  <!-- Item List -->
  <div id="inventoryList" class="mt-3"></div>

  <!-- Empty State -->
  <div id="emptyState" class="text-center mt-5 text-muted">
    No items in inventory
  </div>

</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
    <a href="sell.html" class="nav-item active">
        <div class="nav-icon-wrap"><span>🛒</span><span>Sell</span></div>
    </a>
    <a href="inventory.html" class="nav-item">
        <div class="nav-icon-wrap"><span>📦</span><span>Inventory</span></div>
    </a>
    <a href="customers.html" class="nav-item">
        <div class="nav-icon-wrap"><span>👥</span><span>Customers</span></div>
    </a>
    <a href="summary.html" class="nav-item">
        <div class="nav-icon-wrap"><span>📊</span><span>Summary</span></div>
    </a>
</nav>

<!-- Add Item Modal -->
<div class="modal fade" id="itemModal">
  <div class="modal-dialog">
    <div class="modal-content p-3">

      <h5>Add Item</h5>

      <input type="text" id="itemName" class="form-control mt-2" placeholder="Item Name">

      <input type="number" id="itemPrice" class="form-control mt-2" placeholder="Price">

      <input type="number" id="itemStock" class="form-control mt-2" placeholder="Stock">

      <button class="btn btn-success mt-3" onclick="addItem()">
        Save Item
      </button>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/inventory.js"></script>

</body>
</html>
