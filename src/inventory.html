<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sari-Sari Store — Inventory</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .add-form { display: flex; flex-direction: column; gap: 10px; }
        .add-form input {
            width: 100%; padding: 12px; border-radius: 12px; border: none;
            background: white; font-family: inherit; font-weight: 600;
            font-size: 0.95rem; outline: none; color: var(--text-dark);
        }
        .add-row { display: flex; gap: 10px; }
        .add-row input { flex: 1; }
        .add-btn {
            width: 100%; padding: 13px; border: none; border-radius: 12px;
            background: white; color: var(--primary-blue);
            font-family: inherit; font-size: 0.95rem; font-weight: 800;
            cursor: pointer; transition: opacity 0.2s;
        }
        .item-actions { display: flex; gap: 8px; }
        .edit-btn, .del-btn {
            padding: 8px 14px; border-radius: 10px; border: none;
            font-family: inherit; font-size: 0.82rem; font-weight: 800; cursor: pointer;
        }
        .edit-btn { background: #e8f0fe; color: var(--active-blue); }
        .del-btn { background: #fdecea; color: var(--red); }
        
        /* Modal Styles */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.45); z-index: 500;
            align-items: center; justify-content: center; padding: 20px;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: white; border-radius: 20px; padding: 24px;
            width: 100%; max-width: 400px;
        }
        .modal-btns { display: flex; gap: 10px; margin-top: 10px; }
        .modal-save { flex: 1; padding: 13px; border: none; border-radius: 12px; background: var(--active-blue); color: white; font-weight: 800; cursor: pointer; }
        .modal-cancel { flex: 1; padding: 13px; border: 1.5px solid var(--border); border-radius: 12px; background: white; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>

<div class="topbar"><h1>Inventory</h1></div>

<div class="page">
    <div class="rainbow-card">
        <div class="card-label">Add New Item</div>
        <div class="add-form">
            <input type="text" id="newName" placeholder="Item name">
            <div class="add-row">
                <input type="number" id="newPrice" placeholder="Price (₱)" min="0" step="0.01">
                <input type="number" id="newStock" placeholder="Stock qty" min="0" step="1">
            </div>
            <button class="add-btn" onclick="addItem()">+ Add Item</button>
        </div>
    </div>

    <div class="section-label">All Items</div>
    <div id="itemList"></div>
</div>

<div class="modal-overlay" id="editModal">
    <div class="modal">
        <h2 style="margin-bottom:15px">Edit Item</h2>
        <input type="hidden" id="editId">
        <input type="text" id="editName" placeholder="Item name" style="width:100%; padding:12px; margin-bottom:10px; border-radius:10px; border:1px solid #ddd">
        <div class="add-row" style="margin-bottom:10px">
            <input type="number" id="editPrice" placeholder="Price" style="width:100%; padding:12px; border-radius:10px; border:1px solid #ddd">
            <input type="number" id="editStock" placeholder="Stock" style="width:100%; padding:12px; border-radius:10px; border:1px solid #ddd">
        </div>
        <div class="modal-btns">
            <button class="modal-cancel" onclick="closeModal()">Cancel</button>
            <button class="modal-save" onclick="saveEdit()">Save</button>
        </div>
    </div>
</div>

<nav class="bottom-nav">
    <a href="sell.html" class="nav-item">
        <div class="nav-icon-wrap"><span>🛒</span><span>Sell</span></div>
    </a>
    <a href="inventory.html" class="nav-item active">
        <div class="nav-icon-wrap"><span>📦</span><span>Inventory</span></div>
    </a>
    <a href="customers.html" class="nav-item">
        <div class="nav-icon-wrap"><span>👥</span><span>Customers</span></div>
    </a>
    <a href="summary.html" class="nav-item">
        <div class="nav-icon-wrap"><span>📊</span><span>Summary</span></div>
    </a>
</nav>

<div class="toast" id="toast"></div>

<script src="js/inventory.js"></script>
</body>
</html>
